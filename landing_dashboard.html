<!DOCTYPE html>
<html lang="en">
<head>
<!--
  LANDING REBRAND — LIVE BUILD DASHBOARD
  Serve:  python3 -m http.server 8077 --bind 0.0.0.0   (from project root)
  View:   http://192.168.50.189:8077/landing_dashboard.html
  Polls landing_build_status.json every 2s. Auto-refreshes, no reload needed.
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Landing Rebrand — Live Build</title>
<style>
  :root {
    --bg: #16120e; --panel: #221b14; --panel2: #2b2219; --border: #3d3225;
    --text: #f3e9d8; --muted: #a08e74; --hot: #ff5c1f; --acid: #c6f035;
    --done: #7bd96a; --warn: #ffb02e; --stale: #ff4757;
  }
  * { box-sizing: border-box; }
  body { margin:0; padding:20px; background:var(--bg); color:var(--text);
    font: 14px/1.5 ui-monospace, "SF Mono", Menlo, monospace; }
  .wrap { max-width: 860px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 4px; letter-spacing: -0.5px; }
  h1 .hot { color: var(--hot); }
  .sub { color: var(--muted); margin-bottom: 20px; font-size: 12px; }
  .bar-outer { height: 26px; background: var(--panel); border: 2px solid var(--border);
    border-radius: 6px; overflow: hidden; margin-bottom: 6px; }
  .bar-inner { height: 100%; background: linear-gradient(90deg, var(--hot), var(--acid));
    width: 0%; transition: width .6s ease; }
  .bar-label { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 2px solid var(--border); border-radius: 8px; padding: 14px; }
  .card h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .12em; color: var(--muted); }
  .current { font-size: 15px; }
  .current .phase { color: var(--acid); font-size: 12px; }
  .phases li { list-style: none; padding: 5px 0; border-bottom: 1px dashed var(--border); }
  .phases { margin: 0; padding: 0; }
  .ph-done::before { content: "■ "; color: var(--done); }
  .ph-in_progress::before { content: "■ "; color: var(--hot); animation: blink 1s infinite; }
  .ph-pending::before { content: "□ "; color: var(--muted); }
  .ph-pending { color: var(--muted); }
  @keyframes blink { 50% { opacity: .3; } }
  .meta { display: flex; gap: 18px; flex-wrap: wrap; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .meta b { color: var(--text); }
  .stale { color: var(--stale); font-weight: bold; }
  .log { background: var(--panel2); border: 2px solid var(--border); border-radius: 8px;
    padding: 14px; max-height: 380px; overflow-y: auto; }
  .log h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .12em; color: var(--muted); }
  .log-entry { padding: 7px 0; border-bottom: 1px dashed var(--border); font-size: 13px; }
  .log-entry .ts { color: var(--muted); font-size: 11px; }
  .log-entry .commit { color: var(--acid); }
  .log-entry .gate-passed { color: var(--done); }
  footer { margin-top: 24px; color: var(--muted); font-size: 11px; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <h1>LANDING <span class="hot">REBRAND</span> — LIVE BUILD</h1>
  <div class="sub" id="branch">…</div>
  <div class="bar-outer"><div class="bar-inner" id="bar"></div></div>
  <div class="bar-label" id="barlabel">loading…</div>
  <div class="meta" id="meta"></div>
  <div class="grid">
    <div class="card">
      <h2>Now Building</h2>
      <div class="current" id="current">…</div>
    </div>
    <div class="card">
      <h2>Phases</h2>
      <ul class="phases" id="phases"></ul>
    </div>
  </div>
  <div class="log">
    <h2>Build Log (newest first)</h2>
    <div id="log"></div>
  </div>
  <footer>polls landing_build_status.json every 2s · stale &gt;10min flagged</footer>
</div>
<script>
async function tick() {
  try {
    const r = await fetch('landing_build_status.json?t=' + Date.now());
    const s = await r.json();
    document.getElementById('branch').textContent =
      s.project + ' · branch ' + s.branch + ' · started ' + s.started_at.replace('T',' ');
    const pct = s.total_tasks ? Math.round(100 * s.tasks_done / s.total_tasks) : 0;
    document.getElementById('bar').style.width = (s.total_tasks ? pct : 4) + '%';
    document.getElementById('barlabel').textContent = s.total_tasks
      ? s.tasks_done + ' / ' + s.total_tasks + ' tasks (' + pct + '%)'
      : 'planning — tasks not yet enumerated';
    const upd = new Date(s.updated_at);
    const ageMin = (Date.now() - upd.getTime()) / 60000;
    const staleTag = ageMin > 10 ? ' <span class="stale">⚠ STALE ' + Math.round(ageMin) + 'min</span>' : '';
    document.getElementById('meta').innerHTML =
      '<span>last update: <b>' + s.updated_at.replace('T',' ') + '</b>' + staleTag + '</span>' +
      '<span>last commit: <b>' + (s.last_commit || '—') + '</b></span>' +
      '<span>last gate: <b>' + (s.last_gate_passed || '—') + '</b></span>' +
      '<span>incidents: <b>' + s.incidents + '</b></span>';
    document.getElementById('current').innerHTML =
      '<div class="phase">' + s.current_task.phase + '</div>' +
      s.current_task.id + ' — ' + s.current_task.title +
      ' <span style="color:var(--warn)">[' + s.current_task.status + ']</span>';
    document.getElementById('phases').innerHTML = s.phases.map(p =>
      '<li class="ph-' + p.status + '">' + p.name + '</li>').join('');
    document.getElementById('log').innerHTML = [...s.log].reverse().map(e =>
      '<div class="log-entry"><span class="ts">' + (e.timestamp||'').replace('T',' ') + '</span> · ' +
      '<b>' + e.task + '</b> ' + e.title +
      (e.commit ? ' <span class="commit">' + e.commit + '</span>' : '') +
      (e.gate === 'passed' ? ' <span class="gate-passed">✓ gate</span>' : '') +
      '</div>').join('');
  } catch (e) { document.getElementById('barlabel').textContent = 'waiting for status file… ' + e.message; }
}
tick(); setInterval(tick, 2000);
</script>
</body>
</html>
