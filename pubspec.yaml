name: localocr_extended
description: "LocalOCR Extended — Android client (Flutter port of macOS / web SPA)."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Networking + auth (plan §4)
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  dio_smart_retry: ^7.0.1

  # State / DI / nav (plan §2, §3)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  # JSON codegen — RULE 18 inverted: explicit @JsonKey per field
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Persistence (plan §1)
  drift: ^2.20.2
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.24
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  path: ^1.9.0

  # Camera / scanner / image (plan §1)
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0

  # Charts (plan §1)
  fl_chart: ^0.69.0

  # Notifications (plan §1)
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1

  # Date / time (plan §1)
  intl: ^0.19.0
  timeago: ^3.7.0

  # Misc helpers
  logger: ^2.4.0
  collection: ^1.18.0
  # NOTE: flutter_inappwebview deferred — its 6.1.5 build.gradle still uses
  # `proguard-android.txt` which AGP 9 rejects. The Google OAuth WebView
  # flow (plan §4 / F-105) lands in Phase 5 once the plugin updates OR via
  # a `flutter_web_auth_2` fallback. webview_flutter covers /features.
  webview_flutter: ^4.10.0         # /features WebView fallback (plan §3)
  url_launcher: ^6.3.1             # External browser fallback

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.3
  riverpod_lint: ^2.6.1
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Medium.ttf
          weight: 500
        - asset: assets/fonts/Lora-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700
    - family: iAWriterQuattroS
      fonts:
        - asset: assets/fonts/iAWriterQuattroS-Regular.ttf
        - asset: assets/fonts/iAWriterQuattroS-Italic.ttf
          style: italic
        - asset: assets/fonts/iAWriterQuattroS-Bold.ttf
          weight: 700
        - asset: assets/fonts/iAWriterQuattroS-BoldItalic.ttf
          weight: 700
          style: italic
    - family: iAWriterMonoS
      fonts:
        - asset: assets/fonts/iAWriterMonoS-Regular.ttf
        - asset: assets/fonts/iAWriterMonoS-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
