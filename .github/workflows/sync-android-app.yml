name: Sync Android App

on:
  push:
    branches: [main]
    paths:
      - 'src/frontend/**'
      - 'src/backend/**'
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  sync-android:
    runs-on: self-hosted
    timeout-minutes: 480

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check what changed
        id: diff
        run: |
          LAST_TAG=$(git tag -l "android-build-*" | sort -V | tail -1)
          if [ -z "$LAST_TAG" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            touch CHANGED_FILES.txt
          else
            CHANGES=$(git diff --name-only $LAST_TAG HEAD -- src/)
            if [ -z "$CHANGES" ]; then
              echo "changed=false" >> $GITHUB_OUTPUT
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "$CHANGES" > CHANGED_FILES.txt
            fi
          fi

      - name: Restore Android build artifacts
        run: bash $HOME/actions-runner/actions-runner/restore-android.sh

      - name: Copy agent rules
        run: cp $HOME/actions-runner/actions-runner/agent-rules.md . 2>/dev/null || true

      - name: Run Android delta orchestrator
        if: steps.diff.outputs.changed == 'true'
        run: |
          python3 orchestrator.py \
            --project . \
            --target android \
            --bundle-id com.localocr.android \
            --mode delta \
            --changed-files CHANGED_FILES.txt

      - name: Sync results back
        if: steps.diff.outputs.changed == 'true'
        run: |
          SOURCE=$(pwd)
          DEST=$HOME/.gemini/antigravity/LocalOCR_Extended
          for f in ANDROID_APP_PLAN.md AGENT_LEARNINGS.md \
                   SHIP_READY.md orchestrator_status.json; do
            cp "$SOURCE/$f" "$DEST/" 2>/dev/null || true
          done
          echo "✅ Sync back complete"

      - name: Tag successful build
        if: success() && steps.diff.outputs.changed == 'true'
        run: |
          TAG="android-build-$(date +%Y%m%d-%H%M%S)"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git tag $TAG
          git push origin $TAG

      - name: Create release if ship ready
        if: success() && hashFiles('SHIP_READY.md') != ''
        run: |
          VERSION="v$(date +%Y.%m.%d)-android"
          APK=$(find . -name "*.apk" -path "*/release/*" | head -1)
          if [ -n "$APK" ]; then
            gh release create $VERSION "$APK" \
              --title "LocalOCR Android ${VERSION}" \
              --notes "Auto-build from commit ${{ github.sha }}"
          fi
