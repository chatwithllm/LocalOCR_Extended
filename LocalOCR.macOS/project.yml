# XcodeGen spec for LocalOCR macOS app.
# After installing Xcode + xcodegen (`brew install xcodegen`), run:
#   cd LocalOCR.macOS && xcodegen generate
# This produces LocalOCR.xcodeproj (which is .gitignore'd — regenerate from this file).

name: LocalOCR
options:
  bundleIdPrefix: com.localocr
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO
    # Code signing — local debug only (user said "use unsigned build")
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    exactVersion: 4.2.2
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    exactVersion: 7.12.0

targets:
  LocalOCR:
    type: application
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: LocalOCR
        excludes:
          - "Info.plist"
          - "LocalOCR.entitlements"
    resources:
      - LocalOCR/Resources
    info:
      path: LocalOCR/Info.plist
    entitlements:
      path: LocalOCR/LocalOCR.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extended
        PRODUCT_NAME: LocalOCR
        INFOPLIST_FILE: LocalOCR/Info.plist
        CODE_SIGN_ENTITLEMENTS: LocalOCR/LocalOCR.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: KeychainAccess
      - package: Kingfisher

  LocalOCRTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: LocalOCRTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extendedTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LocalOCR

  LocalOCRUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.0"
    sources:
      - path: LocalOCRUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extendedUITests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LocalOCR

schemes:
  LocalOCR:
    build:
      targets:
        LocalOCR: all
        LocalOCRTests: [test]
        LocalOCRUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LocalOCRTests
        - LocalOCRUITests
    archive:
      config: Release
