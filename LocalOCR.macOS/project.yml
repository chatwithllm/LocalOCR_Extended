# XcodeGen spec for LocalOCR macOS app.
# After installing Xcode + xcodegen (`brew install xcodegen`), run:
#   cd LocalOCR.macOS && xcodegen generate
# This produces LocalOCR.xcodeproj (which is .gitignore'd — regenerate from this file).
#
# Info.plist + LocalOCR.entitlements are generated from this file's
# `info.properties` and `entitlements.properties` blocks below — do not hand-edit
# the .plist files directly. Run `xcodegen generate` after any change here.

name: LocalOCR
options:
  bundleIdPrefix: com.localocr
  deploymentTarget:
    macOS: "13.3"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.3"
    ENABLE_HARDENED_RUNTIME: YES
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    # Code signing — local debug only (user said "use unsigned build")
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess
    exactVersion: 4.2.2
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    exactVersion: 7.12.0

targets:
  LocalOCR:
    type: application
    platform: macOS
    deploymentTarget: "13.3"
    sources:
      - path: LocalOCR
        excludes:
          - "Info.plist"
          - "LocalOCR.entitlements"
    resources:
      - LocalOCR/Resources
    info:
      path: LocalOCR/Info.plist
      properties:
        CFBundleDisplayName: LocalOCR
        CFBundleShortVersionString: 1.0.0
        CFBundleVersion: "1"
        LSMinimumSystemVersion: "13.3"
        LSApplicationCategoryType: public.app-category.finance
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
        NSCameraUsageDescription: "LocalOCR uses your camera (via Continuity Camera) to scan receipts directly from a nearby iPhone or iPad."
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.localocr.extended
            CFBundleURLSchemes:
              - localocr
        CFBundleDocumentTypes:
          - CFBundleTypeName: Receipt Image or PDF
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.jpeg
              - public.png
              - public.heic
              - com.adobe.pdf
    entitlements:
      path: LocalOCR/LocalOCR.entitlements
      properties:
        # Hardened Runtime — required for notarization
        com.apple.security.cs.allow-jit: false
        com.apple.security.cs.disable-library-validation: false
        # Network access — talk to the Flask server
        com.apple.security.network.client: true
        # File access — NSOpenPanel / NSSavePanel / Finder drops
        com.apple.security.files.user-selected.read-write: true
        # Camera — Continuity Camera via AVFoundation
        com.apple.security.device.camera: true
        # App Sandbox intentionally absent (Developer ID direct distribution, §2.1)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extended
        PRODUCT_NAME: LocalOCR
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        COMBINE_HIDPI_IMAGES: YES
    dependencies:
      - package: KeychainAccess
      - package: Kingfisher
    preBuildScripts:
      - name: SwiftLint
        # Runs SwiftLint if installed (`brew install swiftlint`). Skips silently if not present
        # so a fresh checkout still builds before contributors install the tooling.
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config "${SRCROOT}/.swiftlint.yml"
          else
            echo "warning: SwiftLint not installed (skipping). Install: brew install swiftlint"
          fi
        basedOnDependencyAnalysis: false

  LocalOCRTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "13.3"
    sources:
      - path: LocalOCRTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extendedTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LocalOCR

  LocalOCRUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "13.3"
    sources:
      - path: LocalOCRUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localocr.extendedUITests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LocalOCR

schemes:
  LocalOCR:
    build:
      targets:
        LocalOCR: all
        LocalOCRTests: [test]
        LocalOCRUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LocalOCRTests
        - LocalOCRUITests
    archive:
      config: Release
