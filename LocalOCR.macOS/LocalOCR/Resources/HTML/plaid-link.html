<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connect Bank</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: transparent;
      color: #111;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .panel {
      text-align: center;
      max-width: 320px;
      padding: 24px;
    }
    .spinner {
      width: 28px;
      height: 28px;
      margin: 0 auto 12px;
      border: 3px solid rgba(0,0,0,0.12);
      border-top-color: #097fe8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status { font-size: 14px; color: #555; }
    .error { color: #d33; font-weight: 600; }
    .actions { margin-top: 16px; }
    button {
      font: inherit;
      padding: 6px 14px;
      border-radius: 8px;
      border: 1px solid #d0d0d0;
      background: #f7f7f7;
      cursor: pointer;
    }
    @media (prefers-color-scheme: dark) {
      body { color: #f0f0f0; }
      .status { color: #aaa; }
      button { background: #2a2a2a; color: #f0f0f0; border-color: #444; }
    }
  </style>
</head>
<body>
  <div class="panel" id="panel">
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Loading Plaid Link…</div>
    <div class="actions" id="actions" style="display:none">
      <button onclick="retry()">Retry</button>
      <button onclick="cancel()">Cancel</button>
    </div>
  </div>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <script>
    let handler = null;
    let linkToken = null;

    function post(channel, payload) {
      try {
        if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers[channel]) {
          window.webkit.messageHandlers[channel].postMessage(payload || {});
        }
      } catch (e) {
        // Channel missing — silent.
      }
    }

    function setStatus(text, isError) {
      const el = document.getElementById("status");
      const sp = document.getElementById("spinner");
      const ac = document.getElementById("actions");
      el.textContent = text;
      el.className = "status" + (isError ? " error" : "");
      sp.style.display = isError ? "none" : "block";
      ac.style.display = isError ? "block" : "none";
    }

    function retry() {
      if (linkToken) openLink(linkToken);
    }
    function cancel() {
      post("plaidExit", { cancelled: true });
    }

    function openLink(token) {
      if (typeof Plaid === "undefined" || !Plaid.create) {
        setStatus("Plaid Link script failed to load. Check internet and retry.", true);
        return;
      }
      setStatus("Opening Plaid Link…", false);
      handler = Plaid.create({
        token: token,
        onSuccess: function (publicToken, metadata) {
          post("plaidSuccess", { public_token: publicToken, metadata: metadata });
          setStatus("Saving connection…", false);
        },
        onExit: function (err, metadata) {
          if (err) {
            post("plaidExit", { error: { error_code: err.error_code, display_message: err.display_message }, metadata: metadata });
            setStatus(err.display_message || err.error_message || "Plaid Link exited with an error.", true);
          } else {
            post("plaidExit", { cancelled: true, metadata: metadata });
          }
        },
        onEvent: function (eventName, metadata) {
          post("plaidEvent", { event: eventName, metadata: metadata });
        },
      });
      handler.open();
    }

    window.startPlaidLink = function (token) {
      linkToken = token;
      if (!token) {
        setStatus("No link token provided.", true);
        return;
      }
      // Plaid script may still be loading. Poll briefly.
      let tries = 0;
      const max = 40;
      const tick = setInterval(function () {
        tries += 1;
        if (typeof Plaid !== "undefined" && Plaid.create) {
          clearInterval(tick);
          openLink(token);
        } else if (tries >= max) {
          clearInterval(tick);
          setStatus("Plaid Link could not load. Check internet and retry.", true);
        }
      }, 100);
    };

    // Auto-start if the host passed ?token=… in the URL (the WKWebView loader
    // uses postMessage instead by default, but URL fallback is handy for debug).
    (function () {
      const params = new URLSearchParams(location.search);
      const t = params.get("token");
      if (t) window.startPlaidLink(t);
    })();
  </script>
</body>
</html>
