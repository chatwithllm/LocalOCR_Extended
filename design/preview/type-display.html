<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Type — Display scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 26px; }
  .row { display:flex; align-items:baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
  .row:last-child { border-bottom: none; }
  .token { font-family: var(--font-mono); font-size:10px; color: rgba(0,0,0,0.56); width: 80px; flex:0 0 80px; }
  .meta  { font-family: var(--font-mono); font-size:10px; color: rgba(0,0,0,0.56); margin-left:auto; }
  .spec  { color: #1d1d1f; }
  .s-hero { font-family: var(--font-display); font-size: 44px; font-weight: 600; line-height: 1.07; letter-spacing: -0.28px; }
  .s-4xl  { font-family: var(--font-display); font-size: 36px; font-weight: 600; line-height: 1.10; letter-spacing: -0.40px; }
  .s-3xl  { font-family: var(--font-display); font-size: 28px; font-weight: 600; line-height: 1.18; letter-spacing: -0.374px; }
  .s-2xl  { font-family: var(--font-display); font-size: 24px; font-weight: 400; line-height: 1.14; letter-spacing: 0.196px; }
  .s-lg   { font-family: var(--font-display); font-size: 20px; font-weight: 700; line-height: 1.19; letter-spacing: 0.231px; }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="token">hero</div><div class="spec s-hero">Your receipts.</div><div class="meta">56 / 1.07 / 600</div></div>
  <div class="row"><div class="token">4xl</div><div class="spec s-4xl">Receipts</div><div class="meta">40 / 1.10 / 600</div></div>
  <div class="row"><div class="token">3xl</div><div class="spec s-3xl">Recurring obligations</div><div class="meta">34 / 1.18 / 600</div></div>
  <div class="row"><div class="token">2xl</div><div class="spec s-2xl">Trader Joe&rsquo;s · Apr 14</div><div class="meta">28 / 1.14 / 400</div></div>
  <div class="row"><div class="token">lg</div><div class="spec s-lg">Stat card title</div><div class="meta">21 / 1.19 / 700</div></div>
</div>
</body></html>
