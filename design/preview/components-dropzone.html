<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Drop zone — upload states</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: #f5f5f7; }
  .card { background: #f5f5f7; padding: 22px 26px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .dz { border-radius: 12px; background: #fff; padding: 20px 16px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 6px; min-height: 130px; text-align: center; border: 1px dashed rgba(0,0,0,0.22); }
  .dz.hover { border: 2px dashed #0071e3; background: rgba(0,113,227,0.06); color: #0071e3; }
  .dz.invalid { border: 2px dashed #ff3b30; background: rgba(255,59,48,0.06); color: #ff3b30; }
  .dz.uploading { border: 1px solid rgba(0,0,0,0.12); background: #fff; }
  .ico { color: inherit; }
  .title { font-size: 17px; font-weight: 600; letter-spacing: -0.374px; color: inherit; }
  .hint { font-size: 12px; letter-spacing: -0.12px; color: rgba(0,0,0,0.56); }
  .dz.hover .hint, .dz.invalid .hint { color: inherit; opacity: 0.85; }
  .prog { width: 80%; height: 4px; border-radius: 999px; background: #ededf2; overflow: hidden; margin-top: 8px; }
  .prog .fill { height: 100%; width: 62%; background: #0071e3; }
  .label { text-transform: uppercase; letter-spacing: 0.6px; font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.56); margin-top: 10px; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div>
      <div class="dz">
        <svg class="ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0-4 4m4-4 4 4"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
        <div class="title">Drop receipt here</div>
        <div class="hint">JPEG · PNG · HEIC · PDF &nbsp;·&nbsp; or click to browse</div>
      </div>
      <div class="label">Default</div>
    </div>
    <div>
      <div class="dz hover">
        <svg class="ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 16V4m0 0-4 4m4-4 4 4"/><path d="M20 17v2a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2"/></svg>
        <div class="title">Release to upload</div>
        <div class="hint">1 file · trader-joes-0414.jpg</div>
      </div>
      <div class="label">Drag-over</div>
    </div>
    <div>
      <div class="dz uploading">
        <svg class="ico" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#0071e3" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-6.2-8.55"/></svg>
        <div class="title">Uploading trader-joes-0414.jpg</div>
        <div class="hint">62% · ~2s remaining</div>
        <div class="prog"><div class="fill"></div></div>
      </div>
      <div class="label">Uploading</div>
    </div>
    <div>
      <div class="dz invalid">
        <svg class="ico" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="m21 8-9 13L3 8"/><path d="m3 8 9-6 9 6"/></svg>
        <div class="title">File type not supported</div>
        <div class="hint">.HEIF · try converting to JPEG or PDF</div>
      </div>
      <div class="label">Invalid</div>
    </div>
  </div>
</div>
</body></html>
