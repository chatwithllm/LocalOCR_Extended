<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Receipt card — with confidence</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: #f5f5f7; }
  .card { background: #f5f5f7; padding: 22px 26px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .rc { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0px; }
  .img { aspect-ratio: 3/4; position: relative; background: linear-gradient(160deg, #f0f0f2, #d9d9de 60%, #ededf2); overflow: hidden; }
  .img::after { content:""; position:absolute; left:0; right:0; bottom:0; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.4), transparent); }
  /* fake receipt lines */
  .lines { position:absolute; inset: 18% 18% 28% 18%; display:flex; flex-direction:column; gap: 5px; opacity: 0.85; }
  .lines div { background: #8e8e94; height: 5px; border-radius: 1px; }
  .lines div:nth-child(1){ width: 60%; height:7px; background:#3a3a3d; }
  .lines div:nth-child(odd){ width: 80%; }
  .lines div:nth-child(even){ width: 65%; }
  .lines div:last-child { width: 40%; height: 8px; background: #1d1d1f; margin-top: 6px; }
  .conf { position: absolute; top: 10px; right: 10px; border-radius: 980px; padding: 3px 10px; font-size: 12px; font-weight:600; letter-spacing:-0.12px; font-variant-numeric: tabular-nums; backdrop-filter: blur(6px); display:inline-flex; align-items:center; gap: 4px; }
  .conf.high { background: rgba(0,183,74,0.24); color:#00803a; }
  .conf.med  { background: rgba(255,149,0,0.24); color:#a85a00; }
  .conf.low  { background: rgba(255,59,48,0.24); color:#b3271e; }
  .cat { position: absolute; top: 10px; left: 10px; border-radius: 980px; padding: 3px 10px; font-size: 11px; font-weight:600; color:#fff; }
  .body { padding: 14px 14px 16px; }
  .store { font-family: var(--font-display); font-size: 22px; font-weight: 400; line-height: 1.14; letter-spacing: 0.196px; color:#1d1d1f; }
  .meta { font-size: 13px; color: rgba(0,0,0,0.56); margin-top: 4px; letter-spacing: -0.22px; }
  .total { font-size: 14px; color: rgba(0,0,0,0.8); margin-top: 10px; letter-spacing: -0.22px; }
  .total b { font-weight: 600; color: #1d1d1f; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="rc">
      <div class="img">
        <span class="cat" style="background:#34a36b">Grocery</span>
        <span class="conf high">✓ 0.94</span>
        <div class="lines"><div></div><div></div><div></div><div></div><div></div><div></div></div>
      </div>
      <div class="body">
        <div class="store">Trader Joe&rsquo;s</div>
        <div class="meta">Apr 14 · 14 items</div>
        <div class="total">Total <b>$74.31</b></div>
      </div>
    </div>
    <div class="rc">
      <div class="img">
        <span class="cat" style="background:#d37c2b">Restaurant</span>
        <span class="conf med">! 0.71</span>
        <div class="lines"><div></div><div></div><div></div><div></div><div></div></div>
      </div>
      <div class="body">
        <div class="store">Mensho Tokyo</div>
        <div class="meta">Apr 12 · 4 items</div>
        <div class="total">Total <b>$58.90</b></div>
      </div>
    </div>
    <div class="rc">
      <div class="img">
        <span class="cat" style="background:#8450b8">Personal</span>
        <span class="conf low">⚠ 0.38</span>
        <div class="lines"><div></div><div></div><div></div><div></div></div>
      </div>
      <div class="body">
        <div class="store">Claire&rsquo;s Boutique</div>
        <div class="meta">Apr 10 · needs review</div>
        <div class="total">Total <b>$24.50</b></div>
      </div>
    </div>
  </div>
</div>
</body></html>
