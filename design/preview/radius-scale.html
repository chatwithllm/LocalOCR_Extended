<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Radius — scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 26px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .box { background: #fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08); padding: 16px 14px 12px; height: 96px; display:flex; flex-direction:column; justify-content:space-between; }
  .shape { background: #0071e3; height: 48px; }
  .n { font-size: 12px; font-weight: 600; letter-spacing: -0.15px; }
  .m { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.56); }
  .pill-demo { grid-column: 1 / span 2; padding: 14px 16px; display:flex; align-items:center; gap:16px; background: #f5f5f7; border-radius: 12px; }
  .pill-demo .cta { background:#0071e3; color:#fff; border-radius: 980px; padding: 10px 22px; font-weight:400; font-size:14px; }
  .pill-demo .sig { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.56); margin-left:auto; }
</style>
</head><body>
<div class="card">
  <div class="grid">
    <div class="box" style="border-radius:0"><div class="shape" style="border-radius:0"></div><div><div class="n">radius-0</div><div class="m">0</div></div></div>
    <div class="box" style="border-radius:5px"><div class="shape" style="border-radius:5px"></div><div><div class="n">radius-xs</div><div class="m">5px · tags</div></div></div>
    <div class="box" style="border-radius:8px"><div class="shape" style="border-radius:8px"></div><div><div class="n">radius-sm</div><div class="m">8px · buttons, cards</div></div></div>
    <div class="box" style="border-radius:11px"><div class="shape" style="border-radius:11px"></div><div><div class="n">radius-md</div><div class="m">11px · filter chips</div></div></div>
    <div class="box" style="border-radius:12px"><div class="shape" style="border-radius:12px"></div><div><div class="n">radius-lg</div><div class="m">12px · modals</div></div></div>
    <div class="box" style="border-radius:16px"><div class="shape" style="border-radius:16px"></div><div><div class="n">radius-xl</div><div class="m">16px · sheets</div></div></div>
    <div class="box" style="border-radius:50%"><div class="shape" style="border-radius:50%; height:48px; width:48px; margin: 0 auto"></div><div><div class="n">radius-full</div><div class="m">50% · avatars</div></div></div>
    <div class="box" style="border-radius:980px"><div class="shape" style="border-radius:980px; height:24px; margin-top:12px"></div><div><div class="n">radius-pill</div><div class="m">980px · the signature</div></div></div>
  </div>
  <div class="pill-demo" style="margin-top:12px">
    <button class="cta">Scan receipt</button>
    <a href="#" style="color:#0066cc; font-size:14px; letter-spacing:-0.224px">Learn more &rsaquo;</a>
    <span class="sig">signature pill CTA</span>
  </div>
</div>
</body></html>
