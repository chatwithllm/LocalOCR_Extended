<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Colors — Category Domain</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 20px 24px; }
  .row-title { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:10px; }
  .row-title .title { font-family: var(--font-display); font-size: 15px; font-weight:600; letter-spacing:-0.2px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .cat { border-radius: 10px; padding: 12px 14px; background:#fff; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); display:flex; align-items:center; gap:10px; }
  .cat .dot { width: 14px; height: 14px; border-radius:50%; }
  .cat .n { font-weight: 600; font-size:13px; letter-spacing:-0.2px; }
  .cat .h { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.56); margin-left:auto; }
  .pills { display:flex; gap: 8px; flex-wrap:wrap; margin-top:14px; }
  .pill { border-radius: 980px; padding: 3px 10px; font-size: 12px; font-weight:600; color:#fff; letter-spacing:-0.12px; }
</style>
</head><body>
<div class="card">
  <div class="row-title"><span class="title">Spend domain</span><span class="meta">Desaturated — discipline preserved</span></div>
  <div class="grid">
    <div class="cat"><div class="dot" style="background:#34a36b"></div><div class="n">Grocery</div><div class="h">#34a36b</div></div>
    <div class="cat"><div class="dot" style="background:#d37c2b"></div><div class="n">Restaurant</div><div class="h">#d37c2b</div></div>
    <div class="cat"><div class="dot" style="background:#3a7cbd"></div><div class="n">Utility</div><div class="h">#3a7cbd</div></div>
    <div class="cat"><div class="dot" style="background:#8450b8"></div><div class="n">Personal</div><div class="h">#8450b8</div></div>
    <div class="cat"><div class="dot" style="background:#2a8a95"></div><div class="n">Subscription</div><div class="h">#2a8a95</div></div>
    <div class="cat"><div class="dot" style="background:rgba(0,0,0,0.56)"></div><div class="n">Other</div><div class="h">#000 · 56%</div></div>
  </div>
  <div class="pills">
    <span class="pill" style="background:#34a36b">Grocery</span>
    <span class="pill" style="background:#d37c2b">Restaurant</span>
    <span class="pill" style="background:#3a7cbd">Utility</span>
    <span class="pill" style="background:#8450b8">Personal</span>
    <span class="pill" style="background:#2a8a95">Subscription</span>
  </div>
</div>
</body></html>
