<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<title>Spacing — 8px scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { padding: 22px 26px; }
  .row { display:flex; align-items:center; gap: 14px; padding: 6px 0; }
  .token { font-family: var(--font-mono); font-size:10px; width:60px; color: rgba(0,0,0,0.56); }
  .bar { background: #0071e3; height: 14px; border-radius: 3px; }
  .meta { font-family: var(--font-mono); font-size: 10px; color: rgba(0,0,0,0.56); margin-left:auto; }
</style>
</head><body>
<div class="card">
  <div class="row"><div class="token">space-1</div><div class="bar" style="width:4px"></div><div class="meta">4px</div></div>
  <div class="row"><div class="token">space-2</div><div class="bar" style="width:8px"></div><div class="meta">8px</div></div>
  <div class="row"><div class="token">space-3</div><div class="bar" style="width:12px"></div><div class="meta">12px</div></div>
  <div class="row"><div class="token">space-4</div><div class="bar" style="width:16px"></div><div class="meta">16px · base</div></div>
  <div class="row"><div class="token">space-5</div><div class="bar" style="width:20px"></div><div class="meta">20px</div></div>
  <div class="row"><div class="token">space-6</div><div class="bar" style="width:24px"></div><div class="meta">24px</div></div>
  <div class="row"><div class="token">space-8</div><div class="bar" style="width:32px"></div><div class="meta">32px</div></div>
  <div class="row"><div class="token">space-10</div><div class="bar" style="width:40px"></div><div class="meta">40px</div></div>
  <div class="row"><div class="token">space-12</div><div class="bar" style="width:48px"></div><div class="meta">48px · section gap mobile</div></div>
  <div class="row"><div class="token">space-16</div><div class="bar" style="width:64px"></div><div class="meta">64px</div></div>
  <div class="row"><div class="token">space-20</div><div class="bar" style="width:80px"></div><div class="meta">80px · section gap desktop</div></div>
  <div class="row"><div class="token">space-24</div><div class="bar" style="width:96px"></div><div class="meta">96px</div></div>
</div>
</body></html>
