services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: localocr-extended-backend
    ports:
      - "8090:8090"
    volumes:
      - extended-db:/data/db
      - extended-receipts:/data/receipts
      - extended-backups:/data/backups
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - extended-internal
      - extended-external
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  mqtt:
    image: eclipse-mosquitto:2
    container_name: localocr-extended-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./config/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - extended-mosquitto-data:/mosquitto/data
      - extended-mosquitto-log:/mosquitto/log
    networks:
      - extended-internal
    restart: unless-stopped
    profiles:
      - local-infra
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -i healthcheck -W 3 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: localocr-extended-ollama
    ports:
      - "11434:11434"
    volumes:
      - extended-ollama:/root/.ollama
    networks:
      - extended-internal
    restart: unless-stopped
    profiles:
      - local-infra
    # Resource limits — Ollama is memory-intensive
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  extended-db:
    driver: local
  extended-receipts:
    driver: local
  extended-ollama:
    driver: local
  extended-backups:
    driver: local
  extended-mosquitto-data:
    driver: local
  extended-mosquitto-log:
    driver: local

networks:
  extended-internal:
    driver: bridge
    internal: true
  extended-external:
    driver: bridge
